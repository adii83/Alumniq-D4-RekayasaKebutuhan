services:
  # Backend FastAPI
  - type: web
    name: alumni-tracking-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alumni-db
          property: connectionString

databases:
  - name: alumni-db
    plan: free
