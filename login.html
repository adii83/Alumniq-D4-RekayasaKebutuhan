<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AlumniQ</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Inter", sans-serif; background: #f5f7fb; }
        .premium-bg { background: linear-gradient(145deg, #b76e3c, #9a4e1f); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-slate-200 text-center">
        <h1 class="text-3xl font-bold text-slate-800 mb-2 mt-4 text-left">Alumni<span class="text-[#b76e3c]">Q</span></h1>
        <p class="text-sm text-slate-500 mb-8 text-left">Sign in to track alumni data effectively.</p>
        
        <form id="loginForm" class="space-y-4">
            <div class="text-left">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#b76e3c] focus:outline-none" required>
            </div>
            <div class="text-left">
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-[#b76e3c] focus:outline-none" required>
            </div>
            <div id="error-msg" class="text-xs text-red-500 hidden text-left font-medium">Username atau password salah!</div>
            
            <button type="submit" class="w-full mt-6 py-3 rounded-xl text-white font-semibold premium-bg transition hover:opacity-90">
                Sistem Login
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.querySelector('button');
            btn.innerText = 'Verifying...';
            
            try {
                // Ganti dengan URL backend Render
                const res = await fetch('https://backend-alumni-api.onrender.com/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });

                if(res.ok) {
                    const data = await res.json();
                    localStorage.setItem('alumniq_token', data.token);
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('error-msg').classList.remove('hidden');
                }
            } catch (err) {
                // Tampilkan error jika gagal terhubung ke server sama sekali
                document.getElementById('error-msg').innerText = "Gagal terhubung ke server!";
                document.getElementById('error-msg').classList.remove('hidden');
            }
            btn.innerText = 'Sistem Login';
        });
    </script>
</body>
</html>
